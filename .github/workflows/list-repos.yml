name: List My Hugging Face Repositories

on:
  workflow_dispatch:  # manual trigger only (don't auto-run)

jobs:
  list-repos:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install huggingface_hub
        run: pip install -q huggingface_hub

      - name: List my repositories
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python list_hf_repos.py

      - name: Upload repository list
        uses: actions/upload-artifact@v4
        with:
          name: hf-repo-list
          path: hf_repos.json
          retention-days: 7