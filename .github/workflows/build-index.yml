name: Build Embedding Index

on:
  workflow_dispatch:                          # manual trigger
  schedule:
    - cron: '0 2 * * 1'                       # weekly: Monday at 2 AM UTC
  push:
    branches: [ main ]
    paths:
      - 'templates/**/meta.json'             # rebuild when templates change

jobs:
  build-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -q huggingface_hub sentence-transformers numpy

      - name: Run index builder
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_ID: ${{ secrets.HF_REPO_ID }}
        run: python build_index.py

      - name: Upload index as artifact (backup)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: embedding-index
          path: templates_index/_index/
          retention-days: 7