name: Upload Shared Scroll-Reveal Script

on:
  workflow_dispatch:                          # manual trigger
  push:
    branches: [ main ]
    paths:
      - 'upload_scroll_reveal.py'            # auto-run when script changes

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install huggingface_hub
        run: pip install -q huggingface_hub

      - name: Upload scroll-reveal script
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_ID: ${{ secrets.HF_REPO_ID }}
        run: python upload_scroll_reveal.py