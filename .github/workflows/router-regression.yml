name: Router Regression Test

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'router_classifier.py'
      - 'orchestrator_integration_test.py'

jobs:
  regression-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake build-essential

      - name: Install Python dependencies
        run: pip install -q huggingface_hub requests

      - name: Cache llama.cpp build
        uses: actions/cache@v4
        with:
          path: llama.cpp/build
          key: llama-build-${{ runner.os }}-${{ hashFiles('llama.cpp/**') }}
          restore-keys: |
            llama-build-${{ runner.os }}-

      - name: Cache GGUF models
        uses: actions/cache@v4
        with:
          path: gguf_models/
          key: router-model-${{ hashFiles('router_regression.py') }}
          restore-keys: |
            router-model-

      - name: Run regression test
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python router_regression.py