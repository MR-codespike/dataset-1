name: Generate Template Library

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC

jobs:
  generate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install -q huggingface_hub requests
      
      - name: Restore progress from cache
        uses: actions/cache/restore@v4
        with:
          path: templates/
          key: template-progress-${{ github.run_id }}
          restore-keys: template-progress-
      
      - name: Generate templates
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_ID: ${{ secrets.HF_REPO_ID }}
        run: python generate_templates.py
      
      - name: Save progress to cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: templates/
          key: template-progress-${{ github.run_id }}
      
      - name: Upload templates as artifact (backup)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: generated-templates
          path: templates/
          retention-days: 7
