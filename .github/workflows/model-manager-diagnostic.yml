name: Model Manager Diagnostic

on:
  workflow_dispatch:  # manual trigger only

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake build-essential
          pip install -q huggingface_hub requests psutil

      - name: Cache llama.cpp build
        uses: actions/cache@v4
        with:
          path: llama.cpp/build
          key: llama-build-${{ runner.os }}-${{ hashFiles('llama.cpp/**') }}
          restore-keys: |
            llama-build-${{ runner.os }}-

      - name: Cache GGUF models
        uses: actions/cache@v4
        with:
          path: gguf_models/
          key: models-${{ hashFiles('model_manager_diagnostic.py') }}
          restore-keys: |
            models-

      - name: Run diagnostic
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python model_manager_diagnostic.py

      - name: Upload raw response
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coder-raw-response
          path: coder_raw_response.txt
          retention-days: 7