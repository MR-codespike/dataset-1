name: Generate Training Data

on:
  workflow_dispatch:
    inputs:
      examples_per_category:
        description: 'Number of examples per category (terminal, code, direct)'
        required: false
        default: '1000'
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -q huggingface_hub requests

      - name: Generate training data
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_ID: ${{ secrets.HF_REPO_ID }}
        run: python generate_training_data.py

      - name: Upload training data as artifact (backup)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: training-data
          path: |
            classifier_data/classifier_training_data.jsonl
            classifier_data/README.md
          retention-days: 30